name: Synapse Agent Quality Gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  eval:
    name: Run CriticAgent Structural Evaluation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create mock .env for CI
        run: |
          cat > .env.local << 'EOF'
          GCP_PROJECT_ID=ci-mock-project
          GCP_LOCATION=us-central1
          NEXT_PUBLIC_SUPABASE_URL=https://mock.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY=mock-anon-key
          SUPABASE_SERVICE_ROLE_KEY=mock-service-role-key
          HITL_BYPASS=true
          EOF

      - name: Run structural eval suite (CriticAgent — no LLM needed)
        run: npx dotenv-cli -e .env.local -- npx tsx src/scripts/run_eval_suite.ts --mode=structural
        env:
          NODE_ENV: test

      - name: Run red-team adversarial checks
        run: npx dotenv-cli -e .env.local -- npx tsx src/scripts/run_redteam.ts --mode=structural
        env:
          NODE_ENV: test

  lint:
    name: TypeScript & ESLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run lint
